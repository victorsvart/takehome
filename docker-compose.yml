services:
  postgres:
    image: postgres:16-alpine
    container_name: westface-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: westface
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d westface"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - westface_pgdata:/var/lib/postgresql/data

volumes:
  westface_pgdata:
services:
  postgres:
    image: postgres:16-alpine
    container_name: westface-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: westface
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d westface"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: westface-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/westface?schema=public
      RMS_WEBHOOK_URL: https://webhook.site/replace-with-your-url
      RMS_WEBHOOK_SECRET: dev-secret
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

volumes:
  postgres_data:
  backend_node_modules:
