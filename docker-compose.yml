services:
  postgres:
    image: postgres:16-alpine
    container_name: westface-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: westface
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d westface"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - westface_pgdata:/var/lib/postgresql/data

volumes:
  westface_pgdata:
